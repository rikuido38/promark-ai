[request_definition]
r = sub, project, obj, act

[policy_definition]
p = sub, project, obj, act, eft

[role_definition]
g = _, _, _

[policy_effect]
e = some(where (p.eft == allow)) && !some(where (p.eft == deny))

[matchers]
m = g(r.sub, p.sub, r.project) && (r.project == p.project || p.project == "*") && r.obj == p.obj && r.act == p.act
