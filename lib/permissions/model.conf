[request_definition]
r = sub, domain, obj, act

[policy_definition]
p = sub, domain, obj, act, eft

[role_definition]
g = _, _, _

[policy_effect]
e = some(where (p.eft == allow)) && !some(where (p.eft == deny))

[matchers]
m = g(r.sub, p.sub, r.domain) && (r.domain == p.domain || p.domain == "*") && r.obj == p.obj && r.act == p.act
